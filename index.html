<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siconex</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="nav-row">
    <div class="left">
      <span class="menu">☰</span>
      <span class="logo">Siconex</span>
    </div>

    <div class="right">
      <span class="icon">👤</span>
      <span class="icon">
        🛒 <span id="cart-count">0</span>
      </span>
    </div>
  </div>

  <div class="search-row">
    <input type="text" placeholder="Search products, brands and categories">
  </div>
</header>

<!-- MAIN -->
<div class="main">

  <!-- SLIDER -->
  <div class="slider">
    <div class="slides">
      <img src="images/slide.jpg">
      <img src="images/slide1.jpg">
      <img src="images/slide2.jpg">
    </div>
  </div>

  <!-- CATEGORIES -->
  <div class="categories">
    <div class="cat"><img src="images/phones.png"><p>Phones</p></div>
    <div class="cat"><img src="images/laptops.png"><p>Laptops</p></div>
    <div class="cat"><img src="images/tvs.png"><p>TVs</p></div>
    <div class="cat"><img src="images/powerbank.png"><p>Power</p></div>
  </div>

  <!-- PROMO -->
  <div class="promo">
    <img src="images/banner.jpg">
  </div>

  <!-- PRODUCTS (NOW DYNAMIC) -->
  <div class="products" id="product-list"></div>

</div>

<!-- SCRIPTS -->
<script src="products.js"></script>
<script src="app.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siconex</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- HEADER -->
<div id="header-container"></div>
  
<!-- MAIN -->
<div class="main">

  <!-- SLIDER -->
  <div class="slider">
    <div class="slides">
      <img src="images/slide.jpg">
      <img src="images/slide1.jpg">
      <img src="images/slide2.jpg">
    </div>
  </div>

  <!-- CATEGORIES -->
  <div class="categories">
    <div class="cat"><img src="images/phones.png"><p>Phones</p></div>
    <div class="cat"><img src="images/laptops.png"><p>Laptops</p></div>
    <div class="cat"><img src="images/tvs.png"><p>TVs</p></div>
    <div class="cat"><img src="images/powerbank.png"><p>Power</p></div>
  </div>

  <!-- PROMO -->
  <div class="promo">
    <img src="images/banner.jpg">
  </div>

  <!-- PRODUCTS (NOW DYNAMIC) -->
  <div class="products" id="product-list"></div>

</div>

<!-- SCRIPTS -->
<script src="products.js"></script>
<script src="app.js"></script>

  <script>
fetch("header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header-container").innerHTML = data;
  });
  </script>

</body>
</html>
